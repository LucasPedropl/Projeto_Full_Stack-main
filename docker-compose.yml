services:
  db:
    image: postgres:16-alpine
    container_name: gastometer-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gastometer
    ports:
      - "5432:5432"
    volumes:
      - gastometer_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gastometer"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  gastometer_pg_data:
